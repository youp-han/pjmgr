<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PJMGR — 워크스페이스 설정</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: { DEFAULT: '#6366F1', dark: '#4F46E5', light: '#EEF2FF' } } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4" style="font-family: 'Inter', sans-serif;">

  <div class="rounded-2xl shadow-lg p-8 bg-white max-w-2xl w-full">

    <!-- Logo -->
    <div class="flex items-center justify-center gap-2 mb-8">
      <div class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center">
        <span class="text-white font-bold text-sm">PM</span>
      </div>
      <span class="font-bold text-slate-900 text-xl">PJMGR</span>
    </div>

    <!-- Step Indicator -->
    <div class="flex items-center justify-center mb-10">
      <!-- Step 1 (active) -->
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white text-sm font-bold shrink-0">1</div>
        <span class="text-sm font-semibold text-indigo-600 hidden sm:block">워크스페이스</span>
      </div>
      <!-- Line -->
      <div class="flex-1 h-px bg-slate-200 mx-3 max-w-16"></div>
      <!-- Step 2 -->
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 text-sm font-bold shrink-0">2</div>
        <span class="text-sm font-medium text-slate-400 hidden sm:block">팀 초대</span>
      </div>
      <!-- Line -->
      <div class="flex-1 h-px bg-slate-200 mx-3 max-w-16"></div>
      <!-- Step 3 -->
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 text-sm font-bold shrink-0">3</div>
        <span class="text-sm font-medium text-slate-400 hidden sm:block">첫 프로젝트</span>
      </div>
    </div>

    <!-- Heading -->
    <div class="mb-8">
      <h2 class="text-2xl font-bold text-slate-900 mb-1">워크스페이스를 설정하세요</h2>
      <p class="text-slate-500 text-sm">팀의 이름과 로고를 설정하면 바로 시작할 수 있습니다.</p>
    </div>

    <!-- Form -->
    <form class="space-y-6">
      <!-- Workspace Name -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">워크스페이스 이름 <span class="text-red-500">*</span></label>
        <input
          type="text"
          placeholder="회사명 또는 팀명"
          value="TechCorp"
          class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-slate-900 placeholder:text-slate-400"
        >
        <p class="mt-1.5 text-xs text-slate-400">팀원들이 워크스페이스를 식별하는 데 사용됩니다.</p>
      </div>

      <!-- Logo Upload -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">로고 업로드</label>
        <div class="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center hover:border-indigo-400 hover:bg-indigo-50/30 transition-colors cursor-pointer">
          <div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center mx-auto mb-3">
            <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
          </div>
          <p class="text-sm font-medium text-slate-700 mb-1">클릭하여 업로드 또는 드래그 앤 드롭</p>
          <p class="text-xs text-slate-400">PNG, JPG, SVG (최대 2MB)</p>
        </div>
      </div>

      <!-- Grid layout for timezone and language -->
      <div class="grid grid-cols-2 gap-4">
        <!-- Timezone -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">타임존</label>
          <select class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-slate-900 bg-white">
            <option value="Asia/Seoul" selected>Asia/Seoul (KST, UTC+9)</option>
            <option value="UTC">UTC</option>
            <option value="America/New_York">America/New_York (EST)</option>
            <option value="America/Los_Angeles">America/Los_Angeles (PST)</option>
            <option value="Europe/London">Europe/London (GMT)</option>
          </select>
        </div>

        <!-- Language -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">언어</label>
          <select class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-slate-900 bg-white">
            <option value="ko" selected>한국어</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
          </select>
        </div>
      </div>

      <!-- Plan selection -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-3">플랜 선택</label>
        <div class="grid grid-cols-2 gap-3">
          <label class="relative cursor-pointer">
            <input type="radio" name="plan" value="free" class="sr-only peer">
            <div class="border-2 border-slate-200 peer-checked:border-indigo-500 peer-checked:bg-indigo-50 rounded-xl p-4 transition-colors">
              <div class="text-sm font-semibold text-slate-900 mb-1">무료</div>
              <div class="text-xs text-slate-500">최대 5명, 3 프로젝트</div>
              <div class="text-lg font-bold text-slate-900 mt-2">₩0<span class="text-xs font-normal text-slate-500">/월</span></div>
            </div>
          </label>
          <label class="relative cursor-pointer">
            <input type="radio" name="plan" value="pro" checked class="sr-only peer">
            <div class="border-2 border-indigo-500 bg-indigo-50 rounded-xl p-4 transition-colors">
              <div class="flex items-center gap-2 mb-1">
                <span class="text-sm font-semibold text-slate-900">Pro</span>
                <span class="text-xs bg-indigo-600 text-white px-1.5 py-0.5 rounded font-medium">14일 무료</span>
              </div>
              <div class="text-xs text-slate-500">무제한 멤버, 무제한 프로젝트</div>
              <div class="text-lg font-bold text-slate-900 mt-2">₩12,000<span class="text-xs font-normal text-slate-500">/월</span></div>
            </div>
          </label>
        </div>
      </div>

      <!-- Next button -->
      <a href="home.html" class="block w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold rounded-lg text-center transition-colors">
        다음 →
      </a>
    </form>

    <!-- Already have account -->
    <p class="text-center text-sm text-slate-500 mt-5">
      이미 계정이 있나요?
      <a href="login.html" class="text-indigo-600 hover:text-indigo-700 font-medium">로그인 →</a>
    </p>

  </div>

  <!-- Floating Nav -->
  <div class="fixed bottom-4 right-4 flex gap-2 z-50">
    <a href="invite.html" class="px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-600 shadow-sm hover:bg-slate-50">← Prev</a>
    <a href="index.html" class="px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-600 shadow-sm hover:bg-slate-50">Index</a>
    <a href="home.html" class="px-3 py-2 bg-indigo-600 rounded-lg text-sm text-white shadow-sm hover:bg-indigo-700">Next →</a>
  </div>

</body>
</html>

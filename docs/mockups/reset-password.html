<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PJMGR — 비밀번호 재설정</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: { DEFAULT: '#6366F1', dark: '#4F46E5', light: '#EEF2FF' } } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4" style="font-family: 'Inter', sans-serif;">

  <div class="rounded-2xl shadow-lg p-8 bg-white max-w-md w-full">

    <!-- Logo -->
    <div class="flex items-center justify-center gap-2 mb-8">
      <div class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center">
        <span class="text-white font-bold text-sm">PM</span>
      </div>
      <span class="font-bold text-slate-900 text-xl">PJMGR</span>
    </div>

    <!-- Heading -->
    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-slate-900 mb-1">새 비밀번호 설정</h2>
      <p class="text-slate-500 text-sm">안전한 새 비밀번호를 입력해 주세요</p>
    </div>

    <!-- Form -->
    <form class="space-y-4">
      <!-- New Password -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">새 비밀번호</label>
        <div class="relative">
          <input
            type="password"
            placeholder="8자 이상 입력해 주세요"
            class="w-full px-3.5 py-2.5 pr-10 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-slate-900 placeholder:text-slate-400"
          >
          <button type="button" class="absolute right-3 top-2.5 text-slate-400 hover:text-slate-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Password Strength Bar -->
      <div>
        <div class="flex gap-1.5 mb-1.5">
          <div class="h-1.5 flex-1 rounded-full bg-indigo-500"></div>
          <div class="h-1.5 flex-1 rounded-full bg-indigo-500"></div>
          <div class="h-1.5 flex-1 rounded-full bg-indigo-500"></div>
          <div class="h-1.5 flex-1 rounded-full bg-slate-200"></div>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-xs text-slate-500">비밀번호 강도</span>
          <span class="text-xs font-medium text-indigo-600">보통</span>
        </div>
        <ul class="mt-2 space-y-1">
          <li class="flex items-center gap-1.5 text-xs text-emerald-600">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            8자 이상
          </li>
          <li class="flex items-center gap-1.5 text-xs text-emerald-600">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            대소문자 포함
          </li>
          <li class="flex items-center gap-1.5 text-xs text-slate-400">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            특수문자 포함
          </li>
        </ul>
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">비밀번호 확인</label>
        <div class="relative">
          <input
            type="password"
            placeholder="비밀번호를 다시 입력해 주세요"
            class="w-full px-3.5 py-2.5 pr-10 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-slate-900 placeholder:text-slate-400"
          >
          <button type="button" class="absolute right-3 top-2.5 text-slate-400 hover:text-slate-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit button -->
      <a href="login.html" class="block w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold rounded-lg text-center transition-colors mt-2">
        비밀번호 변경
      </a>
    </form>

    <!-- Back to login -->
    <a href="login.html" class="text-sm text-slate-500 hover:text-slate-700 flex items-center justify-center gap-1 mt-6">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      로그인으로 돌아가기
    </a>

  </div>

  <!-- Floating Nav -->
  <div class="fixed bottom-4 right-4 flex gap-2 z-50">
    <a href="forgot-password.html" class="px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-600 shadow-sm hover:bg-slate-50">← Prev</a>
    <a href="index.html" class="px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-600 shadow-sm hover:bg-slate-50">Index</a>
    <a href="invite.html" class="px-3 py-2 bg-indigo-600 rounded-lg text-sm text-white shadow-sm hover:bg-indigo-700">Next →</a>
  </div>

</body>
</html>

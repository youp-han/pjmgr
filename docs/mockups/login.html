<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PJMGR — 로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: { DEFAULT: '#6366F1', dark: '#4F46E5', light: '#EEF2FF' } } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4" style="font-family: 'Inter', sans-serif;">

  <div class="rounded-2xl shadow-lg p-8 bg-white max-w-md w-full">

    <!-- Logo -->
    <div class="flex items-center justify-center gap-2 mb-8">
      <div class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center">
        <span class="text-white font-bold text-sm">PM</span>
      </div>
      <span class="font-bold text-slate-900 text-xl">PJMGR</span>
    </div>

    <!-- Heading -->
    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-slate-900 mb-1">Welcome back</h2>
      <p class="text-slate-500 text-sm">Sign in to your account</p>
    </div>

    <!-- Form -->
    <form class="space-y-4">
      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">이메일</label>
        <input
          type="email"
          value="jisu.kim@company.com"
          class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-slate-900"
        >
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">비밀번호</label>
        <input
          type="password"
          value="password"
          placeholder="••••••••"
          class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-slate-900"
        >
      </div>

      <!-- Remember me + Forgot password -->
      <div class="flex items-center justify-between">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" checked class="w-4 h-4 text-indigo-600 border-slate-300 rounded">
          <span class="text-sm text-slate-600">Remember me</span>
        </label>
        <a href="forgot-password.html" class="text-sm text-indigo-600 hover:text-indigo-700 font-medium">Forgot password?</a>
      </div>

      <!-- Sign in button -->
      <a href="home.html" class="block w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold rounded-lg text-center transition-colors mt-2">
        Sign in
      </a>
    </form>

    <!-- Divider -->
    <div class="flex items-center gap-3 my-6">
      <div class="flex-1 h-px bg-slate-200"></div>
      <span class="text-xs text-slate-400 font-medium">or continue with</span>
      <div class="flex-1 h-px bg-slate-200"></div>
    </div>

    <!-- Social buttons -->
    <div class="grid grid-cols-2 gap-3">
      <button class="flex items-center justify-center gap-2.5 px-4 py-2.5 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors">
        <div class="w-5 h-5 rounded flex items-center justify-center font-bold text-white text-xs" style="background-color: #0078d4;">M</div>
        <span class="text-sm font-medium text-slate-700">Microsoft</span>
      </button>
      <button class="flex items-center justify-center gap-2.5 px-4 py-2.5 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors">
        <div class="w-5 h-5 flex items-center justify-center">
          <span class="font-bold text-sm" style="background: linear-gradient(135deg, #4285f4, #ea4335, #fbbc05, #34a853); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">G</span>
        </div>
        <span class="text-sm font-medium text-slate-700">Google</span>
      </button>
    </div>

    <!-- Sign up link -->
    <p class="text-center text-sm text-slate-500 mt-6">
      Don't have an account?
      <a href="signup.html" class="text-indigo-600 hover:text-indigo-700 font-medium">Sign up →</a>
    </p>

  </div>

  <!-- Floating Nav -->
  <div class="fixed bottom-4 right-4 flex gap-2 z-50">
    <a href="landing.html" class="px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-600 shadow-sm hover:bg-slate-50">← Prev</a>
    <a href="index.html" class="px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-600 shadow-sm hover:bg-slate-50">Index</a>
    <a href="signup.html" class="px-3 py-2 bg-indigo-600 rounded-lg text-sm text-white shadow-sm hover:bg-indigo-700">Next →</a>
  </div>

</body>
</html>

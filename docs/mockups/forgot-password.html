<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PJMGR — 비밀번호 찾기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: { DEFAULT: '#6366F1', dark: '#4F46E5', light: '#EEF2FF' } } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4" style="font-family: 'Inter', sans-serif;">

  <div class="rounded-2xl shadow-lg p-8 bg-white max-w-md w-full text-center">

    <!-- Lock Icon -->
    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 bg-indigo-100 rounded-2xl flex items-center justify-center">
        <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
    </div>

    <!-- Heading -->
    <h2 class="text-2xl font-bold text-slate-900 mb-2">비밀번호를 잊으셨나요?</h2>
    <p class="text-slate-500 text-sm mb-8 leading-relaxed">
      가입한 이메일 주소를 입력하시면<br>재설정 링크를 보내드립니다.
    </p>

    <!-- Form -->
    <form class="text-left space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">이메일</label>
        <input
          type="email"
          value="jisu.kim@company.com"
          class="w-full px-3.5 py-2.5 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-slate-900"
        >
      </div>

      <!-- Submit button -->
      <button type="button" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold rounded-lg transition-colors">
        재설정 링크 보내기
      </button>
    </form>

    <!-- Success state -->
    <div class="mt-4 p-4 bg-emerald-50 border border-emerald-200 rounded-xl text-left">
      <div class="flex items-start gap-3">
        <div class="w-5 h-5 bg-emerald-500 rounded-full flex items-center justify-center shrink-0 mt-0.5">
          <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <div>
          <p class="text-sm font-semibold text-emerald-800 mb-0.5">이메일을 발송했습니다!</p>
          <p class="text-xs text-emerald-600">
            <span class="font-medium">jisu.kim@company.com</span>을 확인해 주세요.<br>
            링크는 30분간 유효합니다.
          </p>
        </div>
      </div>
    </div>

    <!-- Spam note -->
    <p class="text-xs text-slate-400 mt-3">스팸 폴더도 확인해 보세요.</p>

    <!-- Back to login -->
    <a href="login.html" class="text-sm text-slate-500 hover:text-slate-700 flex items-center justify-center gap-1 mt-6">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      로그인으로 돌아가기
    </a>

  </div>

  <!-- Floating Nav -->
  <div class="fixed bottom-4 right-4 flex gap-2 z-50">
    <a href="verify-email.html" class="px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-600 shadow-sm hover:bg-slate-50">← Prev</a>
    <a href="index.html" class="px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-600 shadow-sm hover:bg-slate-50">Index</a>
    <a href="reset-password.html" class="px-3 py-2 bg-indigo-600 rounded-lg text-sm text-white shadow-sm hover:bg-indigo-700">Next →</a>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PJMGR — 이메일 인증</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: { DEFAULT: '#6366F1', dark: '#4F46E5', light: '#EEF2FF' } } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4" style="font-family: 'Inter', sans-serif;">

  <div class="rounded-2xl shadow-lg p-8 bg-white max-w-md w-full text-center">

    <!-- Email Icon -->
    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 bg-indigo-100 rounded-2xl flex items-center justify-center">
        <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
    </div>

    <!-- Heading -->
    <h2 class="text-2xl font-bold text-slate-900 mb-2">이메일을 확인해 주세요</h2>
    <p class="text-slate-500 text-sm mb-8 leading-relaxed">
      <span class="font-medium text-slate-700">jisu.kim@company.com</span>으로<br>
      인증 코드를 발송했습니다.
    </p>

    <!-- OTP Input -->
    <div class="flex justify-center gap-2.5 mb-8">
      <input
        type="text"
        maxlength="1"
        value="4"
        class="w-12 h-12 text-center text-xl font-bold border-2 border-indigo-500 rounded-xl focus:outline-none focus:border-indigo-600 text-slate-900 bg-indigo-50"
      >
      <input
        type="text"
        maxlength="1"
        value="8"
        class="w-12 h-12 text-center text-xl font-bold border-2 border-indigo-500 rounded-xl focus:outline-none focus:border-indigo-600 text-slate-900 bg-indigo-50"
      >
      <input
        type="text"
        maxlength="1"
        value="3"
        class="w-12 h-12 text-center text-xl font-bold border-2 border-indigo-500 rounded-xl focus:outline-none focus:border-indigo-600 text-slate-900 bg-indigo-50"
      >
      <input
        type="text"
        maxlength="1"
        value="1"
        class="w-12 h-12 text-center text-xl font-bold border-2 border-indigo-500 rounded-xl focus:outline-none focus:border-indigo-600 text-slate-900 bg-indigo-50"
      >
      <input
        type="text"
        maxlength="1"
        value=""
        class="w-12 h-12 text-center text-xl font-bold border-2 border-slate-200 rounded-xl focus:outline-none focus:border-indigo-500 text-slate-900"
      >
      <input
        type="text"
        maxlength="1"
        value=""
        class="w-12 h-12 text-center text-xl font-bold border-2 border-slate-200 rounded-xl focus:outline-none focus:border-indigo-500 text-slate-900"
      >
    </div>

    <!-- Verify Button -->
    <a href="onboarding.html" class="block w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold rounded-lg text-center transition-colors mb-4">
      이메일 인증하기
    </a>

    <!-- Resend -->
    <p class="text-sm text-slate-500 mb-6">
      받지 못하셨나요?
      <button class="text-indigo-600 hover:text-indigo-700 font-medium">재발송</button>
    </p>

    <!-- Countdown -->
    <p class="text-xs text-slate-400 mb-6">재발송 가능까지 <span class="font-mono font-medium text-slate-600">02:34</span></p>

    <!-- Back to login -->
    <a href="login.html" class="text-sm text-slate-500 hover:text-slate-700 flex items-center justify-center gap-1">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      로그인으로 돌아가기
    </a>

  </div>

  <!-- Floating Nav -->
  <div class="fixed bottom-4 right-4 flex gap-2 z-50">
    <a href="signup.html" class="px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-600 shadow-sm hover:bg-slate-50">← Prev</a>
    <a href="index.html" class="px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm text-slate-600 shadow-sm hover:bg-slate-50">Index</a>
    <a href="forgot-password.html" class="px-3 py-2 bg-indigo-600 rounded-lg text-sm text-white shadow-sm hover:bg-indigo-700">Next →</a>
  </div>

</body>
</html>
